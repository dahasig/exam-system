<!doctype html><html lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="/static/style.css?v=4"><title>نتائج المرشحين</title></head><body><div class="page"><div class="glass" style="padding:28px"><h1>نتائج المرشحين</h1><table><tr><th>المرشح</th><th>البريد</th><th>الحالة</th><th>الدرجة</th><th>المقالي</th><th>الملاحظات</th><th>التفاصيل</th></tr>{% for e in exams %}<tr><td>{{e.name}}</td><td>{{e.email}}</td><td>{{e.status}}</td><td>{{e.score}}/{{e.total}}</td><td>{{e.essay_count}}</td><td>{{e.suspicion}}</td><td><a href="/admin/exam/{{e.id}}">عرض</a></td></tr>{% endfor %}</table></div></div></body></html>
